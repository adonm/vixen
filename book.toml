[book]
title = "Vixen"
authors = ["adonm"]
description = "A focused cross-platform Rust browser with a Flutter GUI target and first-class headless/CDP automation."
language = "en"
multilingual = false
src = "docs"

[build]
build-dir = "book"
create-missing = false

[output.html]
cname = "vixen.adonm.dev"
git-repository-url = "https://github.com/adonm/vixen"
edit-url-template = "https://github.com/adonm/vixen/edit/main/docs/{path}"
preferred-dark-theme = "ayu"
site-url = "/"
