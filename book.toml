[book]
title = "Vixen"
authors = ["adonm"]
description = "A focused cross-platform browser with one Flutter web renderer, GUI, and rendered automation target."
language = "en"
src = "docs"

[build]
build-dir = "book"
create-missing = false

[output.html]
cname = "vixen.adonm.dev"
git-repository-url = "https://github.com/adonm/vixen"
edit-url-template = "https://github.com/adonm/vixen/edit/main/docs/{path}"
preferred-dark-theme = "ayu"
site-url = "/"
