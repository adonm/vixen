name: Pages

on:
  push:
    branches:
      - main
    paths:
      - book.toml
      - docs/**
      - README.md
      - .github/workflows/pages.yml
  pull_request:
    paths:
      - book.toml
      - docs/**
      - README.md
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  MDBOOK_VERSION: 0.4.52

jobs:
  build:
    name: Build mdBook
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install mdBook
        run: |
          curl -sSfL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" -o mdbook.tar.gz
          mkdir -p "$HOME/.local/bin"
          tar -xzf mdbook.tar.gz -C "$HOME/.local/bin" mdbook
          chmod +x "$HOME/.local/bin/mdbook"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/mdbook" --version

      - name: Build book
        run: mdbook build

      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: book

  deploy:
    name: Deploy Pages
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
