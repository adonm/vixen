name: CI

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  LIBGL_ALWAYS_SOFTWARE: "1"
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
  RUST_TOOLCHAIN: 1.96.1

jobs:
  host:
    name: Host checks
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install host system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libegl-dev libgl1-mesa-dri

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component rustfmt,clippy
          rustup default "$RUST_TOOLCHAIN"

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install Node dependencies
        run: npm ci

      - name: Test baseline utilities
        run: npm test

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check architecture boundaries
        run: python3 scripts/check-vixen-deps.py

      - name: Check workspace
        run: cargo check --workspace --all-targets

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test workspace
        run: cargo test --workspace

      - name: Check native ABI and header
        run: |
          cargo build -p vixen-ffi
          cc -std=c11 -Wall -Wextra -Werror -fsyntax-only crates/vixen-ffi/tests/header_smoke.c
          cargo test -p vixen-ffi c_abi::tests

      - name: Run external Playwright CDP smoke
        run: npm run cdp:playwright-smoke

  security:
    name: Security checks
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup default "$RUST_TOOLCHAIN"

      - name: Install security tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit@0.22.2,cargo-deny@0.20.2
          fallback: none

      - name: Audit dependencies
        run: cargo audit

      - name: Check dependency policy
        run: cargo deny check

  flatpak:
    name: Flatpak bundle
    runs-on: ubuntu-24.04
    needs: host
    permissions:
      contents: write
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check generated Cargo sources
        run: |
          before="$(mktemp)"
          trap 'rm -f "$before"' EXIT
          cp build-aux/cargo-sources.json "$before"
          python3 build-aux/generate-cargo-sources.py
          cmp -s "$before" build-aux/cargo-sources.json || {
            diff -u "$before" build-aux/cargo-sources.json || true
            exit 1
          }

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: org.vixen.Vixen-x86_64.flatpak
          manifest-path: build-aux/org.vixen.Vixen.json
          cache-key: flatpak-builder-${{ github.sha }}
          arch: x86_64

      - name: Attach bundle to tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: org.vixen.Vixen-x86_64.flatpak
          fail_on_unmatched_files: true
