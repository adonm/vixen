name: CI

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  LIBGL_ALWAYS_SOFTWARE: "1"
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
  RUST_TOOLCHAIN: 1.96.1

jobs:
  host:
    name: Host checks
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install host system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libegl-dev libgl1-mesa-dri

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component rustfmt,clippy
          rustup default "$RUST_TOOLCHAIN"

      - name: Stage pinned rusty_v8 archive
        run: |
          set -eu
          archive="$GITHUB_WORKSPACE/.tmp/rusty-v8/librusty_v8.a.gz"
          mkdir -p "$(dirname "$archive")"
          curl --fail --location --retry 3 \
            https://github.com/denoland/rusty_v8/releases/download/v149.4.0/librusty_v8_simdutf_release_x86_64-unknown-linux-gnu.a.gz \
            --output "$archive"
          printf '%s  %s\n' \
            aa30f198b6e7be2188df6498f95053c4c052f212037a01f2c31414d7aca84b53 \
            "$archive" | sha256sum --check
          printf 'RUSTY_V8_ARCHIVE=%s\n' "$archive" >> "$GITHUB_ENV"

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install Node dependencies
        run: npm ci

      - name: Test baseline utilities
        run: npm test

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check architecture boundaries
        run: python3 scripts/check-vixen-deps.py

      - name: Check workspace
        run: cargo check --workspace --all-targets

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test workspace
        run: cargo test --workspace

      - name: Check native ABI and header
        run: |
          cargo build -p vixen-ffi
          cc -std=c11 -Wall -Wextra -Werror -fsyntax-only crates/vixen-ffi/tests/header_smoke.c
          cargo test -p vixen-ffi c_abi::tests

      - name: Run external Playwright CDP smoke
        run: npm run cdp:playwright-smoke

  security:
    name: Security checks
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup default "$RUST_TOOLCHAIN"

      - name: Install security tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit@0.22.2,cargo-deny@0.20.2
          fallback: none

      - name: Audit dependencies
        run: cargo audit

      - name: Check dependency policy
        run: cargo deny check

  linux-release:
    name: Linux release archive
    runs-on: ubuntu-24.04
    needs:
      - host
      - security
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux build and smoke dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cage \
            clang \
            cmake \
            libegl-dev \
            libgl-dev \
            libgtk-3-dev \
            liblzma-dev \
            mesa-vulkan-drivers \
            ninja-build \
            pkg-config

      - name: Install pinned Rust and Flutter beta
        uses: jdx/mise-action@v3
        with:
          install_args: rust hk http:flutter-beta
          cache: true

      - name: Verify Flutter beta revisions
        run: |
          flutter --version --machine | python3 -c '
          import json, sys
          value = json.load(sys.stdin)
          assert value["frameworkVersion"] == "3.46.0-0.3.pre"
          assert value["frameworkRevision"] == "677d472756f83c14371dd8cc624387065f3d32a7"
          assert value["engineRevision"] == "a24b1ea55dedf3ce992cae0fbc1012b22b373290"
          '

      - name: Stage pinned rusty_v8 archive
        run: |
          set -eu
          archive="$GITHUB_WORKSPACE/.tmp/rusty-v8/librusty_v8.a.gz"
          mkdir -p "$(dirname "$archive")"
          curl --fail --location --retry 3 \
            https://github.com/denoland/rusty_v8/releases/download/v149.4.0/librusty_v8_simdutf_release_x86_64-unknown-linux-gnu.a.gz \
            --output "$archive"
          printf '%s  %s\n' \
            aa30f198b6e7be2188df6498f95053c4c052f212037a01f2c31414d7aca84b53 \
            "$archive" | sha256sum --check
          printf 'RUSTY_V8_ARCHIVE=%s\n' "$archive" >> "$GITHUB_ENV"

      - name: Build Flutter release bundle
        run: |
          cd flutter/vixen_shell
          flutter pub get --enforce-lockfile
          flutter build linux --release --no-pub
          strip --strip-unneeded build/linux/x64/release/bundle/vixen_shell
          find build/linux/x64/release/bundle/lib -maxdepth 1 -type f \
            -name '*_plugin.so' -exec strip --strip-unneeded {} +

      - name: Create deterministic release archive
        run: |
          set -eu
          bundle=flutter/vixen_shell/build/linux/x64/release/bundle
          output="$GITHUB_WORKSPACE/vixen-linux-x86_64.tar.gz"
          python3 scripts/package-linux-release.py "$bundle" "$output"
          cp "$output" "$output.first"
          python3 scripts/package-linux-release.py "$bundle" "$output"
          cmp "$output.first" "$output"
          rm "$output.first"
          sha256sum "$(basename "$output")" > "$(basename "$output").sha256"
          tar -tzf "$output" | grep -q '^vixen/lib/libvixen_ffi.so$'
          tar -tzf "$output" | grep -q '^vixen/lib/libflutter_linux_gtk.so$'
          tar -tzf "$output" | grep -q '^vixen/lib/libapp.so$'

      - name: Smoke exact release archive with Impeller
        run: |
          set -eu
          mkdir -p .tmp/linux-release-smoke
          tar -xzf vixen-linux-x86_64.tar.gz -C .tmp/linux-release-smoke
          install -d -m 700 .tmp/wayland-runtime
          set +e
          XDG_RUNTIME_DIR="$GITHUB_WORKSPACE/.tmp/wayland-runtime" \
          GDK_BACKEND=wayland WLR_BACKENDS=headless \
          WLR_LIBINPUT_NO_DEVICES=1 WLR_RENDERER=gles2 \
          LIBGL_ALWAYS_SOFTWARE=1 \
          timeout 15s cage -- .tmp/linux-release-smoke/vixen/vixen_shell \
            > linux-release-smoke.log 2>&1
          status=$?
          set -e
          cat linux-release-smoke.log
          test "$status" -eq 124
          grep -Eq 'Using the Impeller rendering backend \((Vulkan|OpenGLES|VulkanSDF|OpenGLESSDF)\)\.' \
            linux-release-smoke.log

      - name: Upload Linux release assets
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-assets
          path: |
            vixen-linux-x86_64.tar.gz
            vixen-linux-x86_64.tar.gz.sha256
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - linux-release
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download Linux release assets
        uses: actions/download-artifact@v4
        with:
          name: linux-release-assets
          path: release-assets

      - name: Attach archive to tagged release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/vixen-linux-x86_64.tar.gz
            release-assets/vixen-linux-x86_64.tar.gz.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
