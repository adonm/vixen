<!doctype html>
<title>Progress and meter reflection — Vixen fixture</title>
<body>
  <label id="progress-label" for="download">Download</label>
  <progress id="download" value="25" max="100"></progress>
  <label id="meter-label"><meter id="battery" min="0" max="10" low="3" high="8" optimum="9" value="6"></meter>Battery</label>
</body>
