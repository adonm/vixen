<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Flex column layout — Vixen fixture</title>
  <style>
    body { margin: 0; }
    #flex { display: flex; flex-direction: column; width: 120px; height: 140px; margin: 10px; padding: 5px; border: 1px solid black; gap: 10px; }
    #fixed { height: 20px; }
    #grow1 { flex-grow: 1; flex-basis: 0px; }
    #grow2 { flex-grow: 2; flex-basis: 0px; }
  </style>
</head>
<body>
  <section id="flex">
    <div id="fixed">Fixed</div>
    <div id="grow1">Grow one</div>
    <div id="grow2">Grow two</div>
  </section>
</body>
</html>
