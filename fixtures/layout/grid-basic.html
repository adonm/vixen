<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Grid layout — Vixen fixture</title>
  <style>
    body { margin: 0; }
    #grid { display: grid; grid-template-columns: 100px 1fr 2fr; grid-template-rows: 30px 1fr; width: 400px; height: 100px; margin: 10px; padding: 5px; border: 1px solid black; gap: 10px 20px; }
  </style>
</head>
<body>
  <section id="grid">
    <div id="a">A</div>
    <div id="b">B</div>
    <div id="c">C</div>
    <div id="d">D</div>
    <div id="e">E</div>
  </section>
</body>
</html>
