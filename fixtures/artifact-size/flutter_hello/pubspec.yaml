name: vixen_hello
description: Controlled hello-Flutter peer for Vixen Linux release-bundle sizing.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.14.0-28.0.dev
  flutter: '>=3.47.0-1.0.pre-160'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  config:
    linux-gtk-default: gtk4
  uses-material-design: true
