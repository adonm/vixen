<!doctype html>
<meta charset="utf-8">
<title>Vixen CDP Playwright Smoke</title>
<style>
  body { margin: 0; font: 16px sans-serif; }
  #hit { display: block; width: 120px; height: 40px; background: #2b6; }
  #status { width: 200px; height: 30px; background: #eee; }
  #status.clicked { background: #fd0; }
  #dataset-target { width: 80px; height: 24px; background: #b24; color: white; }
  #dataset-target[data-layout-mode="wide"] { width: 140px; height: 32px; background: #2468ca; }
  #rel-target { display: none; }
  #rel-target[rel~="wide"] { display: block; width: 120px; height: 24px; background: #7254c8; color: white; }
  #rel-target[rel~="tall"] { height: 32px; }
  #sandbox-target { display: none; border: 0; }
  #sandbox-target[sandbox~="allow-same-origin"] { display: block; width: 120px; height: 24px; background: #287f8f; }
  #sandbox-target[sandbox~="allow-forms"] { height: 32px; }
  #attributes-target { display: none; }
  #attributes-target[data-layout="wide"] { display: block; width: 120px; height: 24px; background: #56712a; color: white; }
  #attributes-target[data-layout="tall"] { display: block; width: 120px; height: 32px; background: #56712a; color: white; }
  #attr-ops-target { display: none; }
  #attr-ops-target[data-state="visible"] { display: block; width: 120px; height: 32px; background: #b06628; color: white; }
  #nested-scroll { width: 160px; height: 80px; overflow: auto; background: #def; }
  #nested-content { height: 260px; }
  #nested-marker { display: block; margin-top: 120px; width: 120px; height: 30px; }
  #root-tail { height: 700px; }
</style>
<style id="cssom-sheet">#cssom-target { display: none; }</style>
<button id="hit">Hit me</button>
<p id="status">waiting</p>
<div id="dataset-target" data-author-name="ada">dataset</div>
<a id="rel-target" rel="compact">rel target</a>
<iframe id="sandbox-target" sandbox="allow-scripts"></iframe>
<div id="style-target" style="display: none">style target</div>
<div id="attributes-target" data-layout="compact">attributes target</div>
<div id="attr-ops-target" data-state="hidden">attribute operations target</div>
<div id="cssom-target">cssom target</div>
<div id="nested-scroll"><div id="nested-content"><button id="nested-marker">Nested marker</button></div></div>
<input id="default-check" type="checkbox" name="agree">
<label>Extra check <input id="playwright-check" type="checkbox" name="extra"></label>
<form id="smoke-form"><button id="submit" type="submit">Submit</button></form>
<form id="nav-form" action="playwright-next.html">
  <label>Typed name <input id="typed-name" name="typed" value=""></label>
  <label>Typed body <textarea id="typed-body" name="body"></textarea></label>
  <button id="nav-submit" type="submit">Go</button>
</form>
<div id="dynamic-root"></div>
<div id="root-tail">Root tail</div>
<script>
  globalThis.__smokeClicks = 0;
  globalThis.__eventOrder = [];
  globalThis.__nestedScrollEvents = [];
  globalThis.__cancelNestedWheel = false;
  globalThis.__nestedMarkerClicks = 0;
  document.querySelector('#nested-scroll').addEventListener('scroll', (event) => {
    globalThis.__nestedScrollEvents.push(`${event.target.id}:${event.bubbles}:${event.cancelable}`);
  });
  document.querySelector('#nested-scroll').addEventListener('wheel', (event) => {
    if (globalThis.__cancelNestedWheel) event.preventDefault();
  });
  document.querySelector('#nested-marker').addEventListener('click', () => {
    globalThis.__nestedMarkerClicks += 1;
  });
  document.addEventListener('click', (event) => { if (event.target.id === 'hit') globalThis.__eventOrder.push('document-capture'); }, true);
  document.body.addEventListener('click', (event) => { if (event.target.id === 'hit') globalThis.__eventOrder.push('body-capture'); }, true);
  document.body.addEventListener('click', (event) => { if (event.target.id === 'hit') globalThis.__eventOrder.push('body-bubble'); });
  document.querySelector('#smoke-form').addEventListener('submit', (event) => {
    globalThis.__submitSeen = event.target.id;
    event.preventDefault();
  });
  document.querySelector('#hit').addEventListener('click', () => {
    globalThis.__eventOrder.push('target');
    if (!globalThis.__smokeObserverInstalled) {
      globalThis.__smokeObserverInstalled = true;
      new MutationObserver((records) => {
        globalThis.__smokeObserver = records
          .map((record) => record.type + ':' + (record.attributeName || '') + ':' + (record.target.id || record.target.nodeName))
          .join('|');
      }).observe(document.body, { attributes: true, childList: true, subtree: true, attributeOldValue: true });
    }
    globalThis.__smokeClicks += 1;
    const status = document.querySelector('#status');
    status.textContent = 'clicked:' + globalThis.__smokeClicks;
    status.classList.add('clicked');
    status.setAttribute('data-clicked', String(globalThis.__smokeClicks));
    status.style.width = '140px';
    const root = document.querySelector('#dynamic-root');
    const dynamic = document.createElement('span');
    dynamic.id = 'dynamic';
    dynamic.className = 'badge';
    dynamic.textContent = 'dynamic:' + globalThis.__smokeClicks;
    const gone = document.createElement('em');
    gone.id = 'gone';
    gone.textContent = 'gone';
    root.appendChild(gone);
    root.removeChild(gone);
    root.replaceChildren(dynamic, ' ready');
    document.querySelector('#default-check').click();
    document.querySelector('#submit').click();
    console.log('playwright-click', globalThis.__smokeClicks);
  });
</script>
