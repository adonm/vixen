<!doctype html>
<html>
<head><title>WPT selector smoke: :has sibling</title></head>
<body>
  <form>
    <label id="label-checked" for="a">A</label><input id="a" type="checkbox" checked>
    <label id="label-unchecked" for="b">B</label><input id="b" type="checkbox">
    <p id="before-note">Before note</p><p class="note" id="note">Note</p>
    <p id="after-note">After note</p>
  </form>
</body>
</html>
