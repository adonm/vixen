<!doctype html>
<html>
<head>
  <title>WPT cascade smoke: complex has</title>
  <style>
    .card { color: gray; }
    .card:has(> img[alt]) { color: teal; }
    .card:has(.warning) { background-color: #ffeeee; }
    section:has(.card.featured) .badge { display: inline-block; }
  </style>
</head>
<body>
  <section>
    <article id="card" class="card featured"><img id="hero" alt="Hero"><p class="warning">Warning</p></article>
    <span id="badge" class="badge">Badge</span>
  </section>
</body>
</html>
