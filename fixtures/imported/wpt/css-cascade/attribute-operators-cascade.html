<!doctype html>
<html>
<head>
  <title>WPT cascade smoke: attribute operators</title>
  <style>
    [data-state~="selected"] { color: green; }
    a[href^="https"] { color: blue; }
    a[href$=".pdf"] { font-size: 12px; }
    [lang|="en"] { display: block; }
  </style>
</head>
<body>
  <a id="doc" href="https://example.test/report.pdf" data-state="item selected" lang="en-US">Document</a>
  <a id="plain" href="http://example.test/page.html" data-state="item">Plain</a>
</body>
</html>
