<!doctype html>
<html>
<head>
  <title>WPT cascade smoke: structural pseudos</title>
  <style>
    li:first-child { color: red; }
    li:nth-child(2n) { color: blue; }
    li:last-child { color: green; }
    span:only-child { font-size: 20px; }
  </style>
</head>
<body>
  <ol id="items">
    <li id="i1">one</li>
    <li id="i2">two</li>
    <li id="i3">three</li>
  </ol>
  <div id="solo"><span id="only">only</span></div>
</body>
</html>
