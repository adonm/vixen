<!doctype html>
<html>
<head>
  <title>WPT flexbox smoke: row reverse</title>
  <style>
    body { margin: 0; }
    #flex { display: flex; flex-direction: row-reverse; width: 300px; height: 40px; gap: 10px; }
    #a { width: 50px; height: 20px; }
    #b { flex-grow: 1; flex-basis: 0px; height: 20px; }
    #c { flex-grow: 2; flex-basis: 0px; height: 20px; }
  </style>
</head>
<body><div id="flex"><div id="a">A</div><div id="b">B</div><div id="c">C</div></div></body>
</html>
