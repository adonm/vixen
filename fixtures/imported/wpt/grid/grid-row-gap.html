<!doctype html>
<html>
<head>
  <title>WPT grid smoke: row and column gaps</title>
  <style>
    body { margin: 0; }
    #grid { display: grid; width: 100px; grid-template-columns: 40px 40px; grid-template-rows: 10px 20px 30px; row-gap: 5px; column-gap: 10px; }
  </style>
</head>
<body><div id="grid"><div id="a">A</div><div id="b">B</div><div id="c">C</div><div id="d">D</div><div id="e">E</div></div></body>
</html>
