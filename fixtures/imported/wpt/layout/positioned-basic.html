<!doctype html>
<html>
<head>
  <title>WPT layout smoke: positioned basic</title>
  <style>
    body { margin: 0; }
    #container { position: relative; width: 200px; height: 100px; }
    #abs { position: absolute; left: 20px; top: 10px; width: 50px; height: 20px; }
    #rel { position: relative; left: 5px; top: 3px; width: 40px; height: 10px; }
  </style>
</head>
<body><div id="container"><div id="abs">Abs</div><div id="rel">Rel</div></div></body>
</html>
