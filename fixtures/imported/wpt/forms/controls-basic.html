<!doctype html>
<html>
<head><title>WPT forms smoke: controls basic</title></head>
<body>
  <form id="signup">
    <input id="email" type="email" required value="a@example.test">
    <input id="name" type="text" value="Ada">
    <input id="agree" type="checkbox" checked>
    <button id="submit">Submit</button>
    <button id="disabled" disabled>Disabled</button>
  </form>
</body>
</html>
