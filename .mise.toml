#:schema https://mise.jdx.dev/schema/mise.json
# Vixen project & workspace setup — managed by mise.
#
# Canonical one-shot machine setup (Rust toolchain + just + GNOME SDK native
# deps + project tooling):
#
#     mise trust && mise bootstrap --yes
#
# Tools-only (headless CI, no display, no native packages):
#
#     mise install
#
# Then activate mise once per shell and drive the build through the activated
# `cargo` / `just` binaries. Do not hard-code tool paths or wrap every command
# in `mise exec`; the activated shell is the supported workflow:
#
#     eval "$(mise activate bash)"     # bash/zsh users; see docs/guidance/mise.md
#     cargo --version                  # from .cargo/bin, with RUSTUP_TOOLCHAIN set
#     just check-all-host
#     just test-host
#
# References: https://mise.jdx.dev/bootstrap.html and
# https://mise.jdx.dev/lang/rust.html

# --- Workspace-local Cargo home ---------------------------------------------
# `CARGO_HOME` points inside the workspace (`.cargo/`) so the registry cache,
# git checkouts, and `cargo-binstall`-installed tooling (cargo-audit, etc.)
# all live next to the source — keeping reads and writes inside the workspace
# and out of the user's `~/.cargo`. See `docs/guidance/cargo-home.md`.
#
# `mise` exports these to any mise-active shell; the PATH entry makes the
# installed binaries reachable from `just audit` / `just fuzz-init`.
[env]
CARGO_HOME = "{{ config_root }}/.cargo"
# `_.path` is mise's dedicated PATH-prepend directive. Each entry is pushed
# in front of the inherited PATH, so the workspace's binstalled tooling
# (cargo-audit, cargo-deny, cargo-fuzz — see `setup-dev-tools`) wins over
# anything the user has in their `~/.cargo/bin`.
_.path = ["{{ config_root }}/.cargo/bin"]

[tools]
# Rust MSRV is 1.88 (let-chains are used in vixen-net, docs/SPEC.md); the
# *library* MSRV is declared in each crate's `rust-version`. The developer
# toolchain is pinned here so a mise-activated shell is reproducible. The mise
# Rust backend drives rustup: it sets RUSTUP_TOOLCHAIN and puts Cargo's bin dir
# from CARGO_HOME on PATH once the shell is activated.
rust = { version = "1.96.1", profile = "default", components = "rustfmt,clippy" }
just = "1.55.1"
# Self-contained: bootstrap tasks use binstall to fetch optional dev tooling.
cargo-binstall = "1.20.1"

# --- GNOME SDK --------------------------------------------------------------
# The GNOME 50 SDK is NOT installed on the host. It is managed inside a
# flatpak-builder container image — see docs/guidance/gnome-sdk-flatpak-builder.md
# and the `just flatpak-*` recipes (justfile). Intentionally no
# `[bootstrap.packages]` GNOME entries: pull the image with `just flatpak-update-sdk`
# and build with `just flatpak-build`. For ad-hoc native shell work, install
# your distro's gtk4 / libadwaita -devel packages yourself (unsupported path).

# --- Imperative project bootstrap -------------------------------------------
# `mise bootstrap` runs this as step 8 (after tools are installed), with the
# project env active. Everything here is idempotent.
[tasks.bootstrap]
description = "Converge the Vixen workspace: rust components, nightly (for fuzz), dev tooling, then a build check."
depends = ["setup-rust", "setup-dev-tools", "verify"]

[tasks.setup-rust]
hide = true
description = "Install the nightly toolchain cargo-fuzz needs. Stable rustfmt/clippy are declared in [tools]."
run = [
    "rustup toolchain install nightly --profile minimal --component rust-src --allow-downgrade || true",
]

[tasks.setup-dev-tools]
hide = true
description = "Optional dev tooling (audit/deny/fuzz) used by the justfile."
run = [
    "cargo binstall --no-confirm cargo-audit cargo-deny || true",
    "cargo binstall --no-confirm cargo-fuzz || cargo install cargo-fuzz || true",
]

[tasks.verify]
hide = true
description = "Confirm the workspace type-checks after setup."
run = "just check-all-host"
