#:schema https://mise.jdx.dev/schema/mise.json
# Vixen project & workspace setup — managed by mise.
#
# Canonical one-shot machine setup (Rust toolchain + just + optional Cargo dev
# tooling + a build check):
#
#     mise trust && mise bootstrap --yes
#
# Tools-only (headless CI, no display, no native packages):
#
#     mise install
#
# Then activate mise once per shell and drive repository actions through the
# justfile. Do not hard-code tool paths or wrap every command in `mise exec`;
# the activated shell is the supported workflow:
#
#     eval "$(mise activate bash)"     # bash/zsh users; see docs/guidance/mise.md
#     cargo --version                  # from .cargo/bin, with RUSTUP_TOOLCHAIN set
#     just check
#     just test
#
# References: https://mise.jdx.dev/bootstrap.html and
# https://mise.jdx.dev/lang/rust.html

# --- Workspace-local Cargo home ---------------------------------------------
# `CARGO_HOME` points inside the workspace (`.cargo/`) so the registry cache,
# git checkouts, and `cargo-binstall`-installed tooling (cargo-audit, etc.)
# all live next to the source — keeping reads and writes inside the workspace
# and out of the user's `~/.cargo`. See `docs/guidance/cargo-home.md`.
#
# `mise` exports these to any mise-active shell; the PATH entry makes the
# installed binaries reachable from `just audit` / `just fuzz-security`.
[env]
CARGO_HOME = "{{ config_root }}/.cargo"
FLUTTER_PREBUILT_ENGINE_VERSION = "469f2b34de41cab5f677ba84d6e9099c0e682d1e"
HK_MISE = "1"
# `_.path` is mise's dedicated PATH-prepend directive. Each entry is pushed
# in front of the inherited PATH, so the workspace's binstalled tooling
# (cargo-audit, cargo-deny, cargo-fuzz — see `setup-dev-tools`) wins over
# anything the user has in their `~/.cargo/bin`.
_.path = ["{{ config_root }}/.cargo/bin"]

[tools]
# Rust MSRV is 1.88 (let-chains are used in vixen-net, docs/SPEC.md); the
# *library* MSRV is declared in each crate's `rust-version`. The developer
# toolchain is pinned here so a mise-activated shell is reproducible. The mise
# Rust backend drives rustup: it sets RUSTUP_TOOLCHAIN and puts Cargo's bin dir
# from CARGO_HOME on PATH once the shell is activated.
rust = { version = "1.96.1", profile = "default", components = "rustfmt,clippy" }
just = "1.55.1"
hk = "1.50.0"
mdbook = "0.4.52"
# Self-contained: `just setup-dev-tools` uses binstall to fetch optional tooling.
cargo-binstall = "1.20.1"
# Playwright/CDP smoke runner. We use `playwright-core` (package.json), so no
# browser binaries are downloaded; the script connects to Vixen's CDP endpoint.
node = "24.18.0"

# Immutable flutter-dev SDK with the GTK4 Linux embedder and Dart 3.14.
[tools."http:flutter"]
version = "3.47.0-1.0.pre-160"

[tools."http:flutter".platforms]
linux-x64 = { url = "https://github.com/adonm/flutter-dev/releases/download/flutter-sdk-328b829d35a3a5d7a00e0c2f0e97eb8cc0d97188/flutter-linux-x64-328b829d35a3a5d7a00e0c2f0e97eb8cc0d97188.tar.xz", checksum = "sha256:b6e95c97348bebd1f129db1f1cbfb7a4a8f6481839ebe80d3eb746e102336bb9" }

# --- Linux release builder --------------------------------------------------
# Direct Ubuntu development uses the GTK4 packages documented in
# `docs/guidance/mise.md`. Local and CI release builds use the pinned Docker
# image (`just docker-builder-pull`), and FlatPark repackages the resulting
# official GitHub Release archive.

# --- Imperative project bootstrap -------------------------------------------
# `mise bootstrap` runs this after [tools] are installed, with the project env
# active. Keep project command logic in the justfile; mise owns versions/env.
[tasks.bootstrap]
description = "Converge Vixen through the justfile: optional tools, nightly for fuzzing, then a build check."
run = "just setup"

[hooks]
postinstall = "hk install --mise"
