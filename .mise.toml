#:schema https://mise.jdx.dev/schema/mise.json
# Vixen project & workspace setup — managed by mise.
#
# Canonical one-shot machine setup (Rust toolchain + just + GNOME SDK native
# deps + project tooling):
#
#     mise trust && mise bootstrap --yes
#
# Tools-only (headless CI, no display, no native packages):
#
#     mise install
#
# Then drive the build through `just` (itself mise-managed):
#
#     just check-all-host
#     just test-host
#
# Reference: https://mise.jdx.dev/bootstrap.html

[tools]
# Rust MSRV is 1.88 (let-chains are used in vixen-net, docs/SPEC.md); the
# *library* MSRV is declared in each crate's `rust-version`. The dev toolchain
# floats to the newest stable via the core `rust` backend (rustup), so rustfmt
# and clippy track latest too. They're added explicitly by `setup-rust`.
rust = "latest"
just = "latest"
# Self-contained: bootstrap tasks use binstall to fetch optional dev tooling.
cargo-binstall = "latest"

# --- GNOME SDK --------------------------------------------------------------
# The GNOME 50 SDK is NOT installed on the host. It is managed inside a
# flatpak-builder container image — see docs/guidance/gnome-sdk-flatpak-builder.md
# and the `just flatpak-*` recipes (justfile). Intentionally no
# `[bootstrap.packages]` GNOME entries: pull the image with `just flatpak-update-sdk`
# and build with `just flatpak-build`. For ad-hoc native shell work, install
# your distro's gtk4 / libadwaita -devel packages yourself (unsupported path).

# --- Imperative project bootstrap -------------------------------------------
# `mise bootstrap` runs this as step 8 (after tools are installed), with the
# project env active. Everything here is idempotent.
[tasks.bootstrap]
description = "Converge the Vixen workspace: rust components, nightly (for fuzz), dev tooling, then a build check."
depends = ["setup-rust", "setup-dev-tools", "verify"]

[tasks.setup-rust]
hide = true
description = "rustfmt + clippy components and the nightly toolchain cargo-fuzz needs."
run = [
    "rustup component add rustfmt clippy",
    "rustup toolchain install nightly --profile minimal --component rust-src --allow-downgrade || true",
]

[tasks.setup-dev-tools]
hide = true
description = "Optional dev tooling (audit/deny/fuzz) used by the justfile."
run = [
    "cargo binstall --no-confirm cargo-audit cargo-deny || true",
    "cargo binstall --no-confirm cargo-fuzz || cargo install cargo-fuzz || true",
]

[tasks.verify]
hide = true
description = "Confirm the workspace type-checks after setup."
run = "just check-all-host"
