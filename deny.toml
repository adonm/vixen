# cargo-deny policy for Vixen release audits.
# Keep this boring and explicit: only common permissive/copyleft-compatible
# licenses used by the current dependency graph are allowed.

[advisories]
unmaintained = "all"
ignore = [
    # Transitive through deno_core; bincode 1.3.3 has no safe upgrade.
    "RUSTSEC-2025-0141",
    # Transitive through v8; paste has no safe upgrade in the current release.
    "RUSTSEC-2024-0436",
]

[graph]
all-features = true

[bans]
multiple-versions = "allow"
wildcards = "allow"

[licenses]
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
